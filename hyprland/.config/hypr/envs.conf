# --- Hybrid GPU (Intel Iris Xe + Nvidia RTX 3050 Mobile) ---
# Intel iGPU as primary renderer (drives eDP-1 laptop display, saves battery).
# Nvidia dGPU second (required for DP-2 external monitor output).
# Using stable by-path symlinks so boot-order changes don't break things.
env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card:/dev/dri/by-path/pci-0000:01:00.0-card

env = XDG_SESSION_TYPE,wayland

# Hardware video acceleration via nvidia-vaapi-driver
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct

# DO NOT set GBM_BACKEND=nvidia-drm or __GLX_VENDOR_LIBRARY_NAME=nvidia
# on hybrid laptops — the laptop display is wired to Intel, forcing
# everything through Nvidia causes crashes.
