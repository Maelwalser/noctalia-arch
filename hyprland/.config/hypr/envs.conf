# --- Hybrid GPU (Intel Iris Xe + Nvidia RTX 3050 Mobile) ---
# GPU config is auto-generated by scripts/gpu-setup.sh at launch.
# Run: ~/.config/hypr/scripts/gpu-setup.sh
# It detects whether an external monitor is on the NVIDIA output
# and writes gpu.conf with either hybrid or intel-only settings.

env = XDG_SESSION_TYPE,wayland
