# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
     rounding = 8
}

misc {
    # Keeps the "fullscreen" state when switching focus
    on_focus_under_fullscreen = true
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
# Preserves the layout structure when moving/opening windows
    preserve_split = true
}
general {
  gaps_in = 5
  gaps_out = 8
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}
animations {
    enabled = true

    # Define a custom Bezier curve for "snappy" movement
    # format: name, x0, y0, x1, y1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    # Animation syntax: name, enable (0/1), speed, curve, [style]
    
    # Opening/Closing applications
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    
    # Alt-Tabbing / Changing Focus
    # (Note: Hyprland uses 'fade' for the transition appearance)
    animation = fade, 1, 3, default
    
    # Workspace switching
    animation = workspaces, 1, 2, default, slide
    # Borders and others (keep 0 if you want instant)

    animation = fade, 0   
    animation = border, 0
    animation = windowsMove, 1, 2, myBezier
}
