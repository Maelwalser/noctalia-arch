# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
     rounding = 8
}

misc {
    # Keeps the "fullscreen" state when switching focus
    on_focus_under_fullscreen = true
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
# Preserves the layout structure when moving/opening windows
#    preserve_split = true
}
general {
  gaps_in = 5
  gaps_out = 8
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}
animations {
    enabled = true
    
    # ---------------------------------------------------------
    # Fix: "focus" is not a valid name. Use "border" instead.
    # ---------------------------------------------------------

    # Disable the sliding border when switching focus
    animation = border, 0
    
    # Disable windows sliding when they move/re-arrange
    animation = windowsMove, 0
    
    # Keep other animations standard (optional defaults for reference)
    # animation = windows, 1, 5, default
    # animation = fade, 1, 5, default
    # animation = workspaces, 1, 5, default
}
